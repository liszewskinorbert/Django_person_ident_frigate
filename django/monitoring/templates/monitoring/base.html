<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}System Monitoringu{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f8ef7;
      --accent-hover: #6aa0ff;
      --danger: #e05c5c;
      --success: #4caf50;
      --warn: #f0a500;
      --text: #e2e6f0;
      --text-muted: #7a82a0;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      height: 56px;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      text-decoration: none;
      margin-right: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-brand svg { flex-shrink: 0; }

    .nav-links { display: flex; gap: 4px; flex: 1; }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 8px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      transition: color .15s, background .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--text);
      background: var(--surface2);
    }

    .nav-links a.active { color: var(--accent); }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .nav-user a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: border-color .15s, color .15s;
    }

    .nav-user a:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MAIN ── */
    main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
    }

    /* ── TABLE ── */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* ── BADGES ── */
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
    }
    .badge-new { background: rgba(79,142,247,.2); color: var(--accent); border: 1px solid rgba(79,142,247,.3); }
    .badge-ok  { background: rgba(76,175,80,.2); color: var(--success); border: 1px solid rgba(76,175,80,.3); }
    .badge-fa  { background: rgba(224,92,92,.2); color: var(--danger); border: 1px solid rgba(224,92,92,.3); }
    .badge-warn{ background: rgba(240,165,0,.2); color: var(--warn); border: 1px solid rgba(240,165,0,.3); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      text-decoration: none;
      transition: background .15s, border-color .15s, color .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-outline { background: transparent; border-color: var(--border); color: var(--text-muted); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: transparent; border-color: rgba(224,92,92,.4); color: var(--danger); }
    .btn-danger:hover { background: rgba(224,92,92,.1); }
    .btn-success { background: transparent; border-color: rgba(76,175,80,.4); color: var(--success); }
    .btn-success:hover { background: rgba(76,175,80,.1); }
    .btn-sm { padding: 5px 11px; font-size: 12px; }

    /* ── FORM ── */
    .form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    select, input[type=text], input[type=date], input[type=password] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: var(--radius);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
      min-width: 140px;
    }
    select:focus, input:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      text-transform: none;
      letter-spacing: 0;
    }
    input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; }

    /* ── PAGINATION ── */
    .pagination { display: flex; gap: 4px; align-items: center; justify-content: center; margin-top: 20px; }
    .pagination a, .pagination span {
      display: inline-block;
      padding: 6px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid var(--border);
      transition: border-color .15s, color .15s;
    }
    .pagination a:hover { border-color: var(--accent); color: var(--accent); }
    .pagination .current { border-color: var(--accent); color: var(--accent); }

    /* ── HELPERS ── */
    .page-header { margin-bottom: 20px; display: flex; align-items: center; gap: 12px; justify-content: space-between; }
    .page-title { font-size: 20px; font-weight: 700; }
    .text-muted { color: var(--text-muted); }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .gap-8 { gap: 8px; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    @media (max-width: 900px) {
      .grid-4 { grid-template-columns: 1fr 1fr; }
      .grid-3 { grid-template-columns: 1fr 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
    }

    /* ── STAT CARD ── */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); }
    .stat-value { font-size: 32px; font-weight: 700; line-height: 1; }
    .stat-value.accent { color: var(--accent); }
    .stat-value.success { color: var(--success); }
    .stat-value.danger { color: var(--danger); }
    .stat-value.warn { color: var(--warn); }

    /* ── BAR CHART ── */
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .bar-label { width: 120px; font-size: 12px; color: var(--text-muted); text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; }
    .bar-fill { height: 8px; border-radius: 4px; background: var(--accent); }
    .bar-count { width: 40px; font-size: 12px; color: var(--text-muted); }

    /* ── VIDEO ── */
    video { width: 100%; border-radius: var(--radius); background: #000; }

    /* ── MESSAGES ── */
    .messages { list-style: none; margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
    .messages li { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; }
    .messages .success { background: rgba(76,175,80,.15); border: 1px solid rgba(76,175,80,.3); color: var(--success); }
    .messages .error { background: rgba(224,92,92,.15); border: 1px solid rgba(224,92,92,.3); color: var(--danger); }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
    </svg>
    Monitor
  </a>

  <div class="nav-links">
    <a href="{% url 'monitoring:camera_preview' %}" {% if request.resolver_match.url_name == 'camera_preview' %}class="active"{% endif %}>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 10 4.553-2.069A1 1 0 0 1 21 8.82v6.36a1 1 0 0 1-1.447.89L15 14M5 18h8a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2z"/></svg>
      Kamery
    </a>
    <a href="{% url 'monitoring:event_list' %}" {% if request.resolver_match.url_name == 'event_list' %}class="active"{% endif %}>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h6M9 16h6M9 8h6M5 21h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2z"/></svg>
      Zdarzenia
    </a>
    <a href="{% url 'monitoring:statistics' %}" {% if request.resolver_match.url_name == 'statistics' %}class="active"{% endif %}>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
      Statystyki
    </a>
  </div>

  {% if user.is_authenticated %}
  <div class="nav-user">
    <span>{{ user.username }}</span>
    <form method="post" action="{% url 'logout' %}" style="display:inline">
      {% csrf_token %}
      <button type="submit" style="background:none;border:1px solid var(--border);color:var(--text-muted);padding:5px 12px;border-radius:var(--radius);cursor:pointer;font-size:12px;transition:border-color .15s,color .15s;">
        Wyloguj
      </button>
    </form>
  </div>
  {% endif %}
</nav>

<main>
  {% if messages %}
  <ul class="messages">
    {% for m in messages %}
    <li class="{{ m.tags }}">{{ m }}</li>
    {% endfor %}
  </ul>
  {% endif %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
