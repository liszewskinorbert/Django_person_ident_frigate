services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    shm_size: "256mb"            # bufor dla detektorów; zwiększ przy większej rozdzielczości/FPS
    env_file:
      - .env                     # dane logowania do kamery (FRIGATE_RTSP_USER / _PASSWORD)
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./frigate/config:/config
      - /media/frigate:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 500000000        # ~500 MB - bufor cache dla nagran/detekcji
    ports:
      - "5000:5000"               # panel WWW Frigate
      - "8554:8554"                # go2rtc - RTSP restream
      - "8555:8555/tcp"            # go2rtc - WebRTC
      - "8555:8555/udp"
    depends_on:
      - mqtt

# --------------------------------------------------------------------
# USUNIETO (vs. poprzednia wersja):
#
#   privileged: true
#   devices:
#     - /dev/dri:/dev/dri
#
# Powod: te opcje sluza wylacznie sprzetowemu dekodowaniu wideo na
# Intel iGPU (VAAPI) i akceleracji OpenVINO przez GPU. Na Twojej maszynie
# i915/iGPU i tak nie jest wykrywane, a CPU detector OpenVINO crashuje
# (Illegal instruction - brak AVX). Bez tych opcji Frigate uzywa czysto
# programowego dekodowania ffmpeg, co dla 1 kamery (substream 640x360@5fps)
# jest pomijalnym obciazeniem.
#
# Jesli w przyszlosci sprawdzisz `lscpu | grep avx` i okaze sie, ze AVX
# JEST dostepne (np. po zmianie typu CPU maszyny wirtualnej na "host"),
# mozesz wrocic do OpenVINO i ewentualnie przywrocic te opcje.
# --------------------------------------------------------------------
